<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>HUA MULAN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      text-align: center;
    }

    .container {
      padding: 50px 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      opacity: 0.85;
      max-width: 420px;
      margin: 0 auto 30px;
      font-size: 16px;
    }

    .app-image {
      width: 180px;
      border-radius: 25px;
      margin: 20px 0;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .buttons a {
      display: block;
      margin: 12px auto;
      padding: 15px;
      width: 270px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
      font-size: 16px;
    }

    .apple {
      background: black;
      color: white;
    }

    .android {
      background: #22c55e;
      color: white;
    }

    .buttons a:hover {
      transform: scale(1.06);
    }

    .features {
      margin-top: 50px;
    }

    .feature {
      margin: 15px 0;
      font-size: 18px;
    }

    footer {
      margin-top: 60px;
      opacity: 0.5;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>🔥 HUA MULAN</h1>
  <p>Удобное и современное приложение. Попробуй и оцени сам!</p>

  <img class="app-image" src="https://via.placeholder.com/300" alt="HUA MULAN">

  <div class="buttons">
    <a class="apple" href="https://apps.apple.com/ru/app/hua-mulan/id6737823415" target="_blank">
       Скачать в App Store
    </a>

    <a class="android" href="https://play.google.com/store/apps/details?id=io.zenky.huamulan" target="_blank">
      ▶ Скачать в Google Play
    </a>
  </div>

  <div class="features">
    <div class="feature">⚡ Быстро и удобно</div>
    <div class="feature">🎯 Полезно каждый день</div>
    <div class="feature">💎 Бесплатно</div>
  </div>

  <footer>
    © 2026 HUA MULAN
  </footer>

</div>

</body>
</html>
